<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Vortex | Solar System Explorer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }

        /* Glass Holoframe Overlay */
        #holoframe {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 400px;
            max-height: 70vh;
            background: rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            color: #fff;
            padding: 30px;
            display: none;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s ease;
            overflow-y: auto;
        }

        #holoframe.active {
            display: flex;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #holoframe h2 { color: #00ffff; margin-top: 0; border-bottom: 1px solid #00ffff; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        #holoframe p { line-height: 1.6; font-size: 0.95rem; }
        
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: 1px solid #00ffff;
            color: #00ffff;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.5);
            pointer-events: none;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="holoframe">
        <button class="close-btn" onclick="closeHolo()">EXIT</button>
        <h2 id="planet-name">Planet Name</h2>
        <div id="planet-info"></div>
    </div>

    <div class="instruction">Swipe to Orbit • Scroll to Zoom • Click Planets for Data</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- NASA DATA ---
        const solarData = {
            "Sun": "The Sun is a 4.5 billion-year-old star – a hot glowing ball of hydrogen and helium at the center of our solar system. It is roughly 93 million miles from Earth.",
            "Mercury": "The smallest planet in our solar system and closest to the Sun—is only slightly larger than Earth's Moon. It has no moons.",
            "Venus": "Spinning in the opposite direction from most planets, Venus is the hottest planet, with a surface temperature hot enough to melt lead.",
            "Earth": "Our home planet is the only place we know of so far that’s inhabited by living things. It is the only world in our solar system with liquid water on the surface.",
            "Mars": "Mars is a dusty, cold, desert world with a very thin atmosphere. There is strong evidence Mars was—billions of years ago—wetter and warmer, with a thicker atmosphere.",
            "Jupiter": "Jupiter is more than twice as massive than the other planets of our solar system combined. The giant planet's Great Red spot is a centuries-old storm bigger than Earth.",
            "Saturn": "Adorned with a dazzling, complex system of icy rings, Saturn is unique in our solar system. The other giant planets have rings, but none are as spectacular as Saturn's.",
            "Uranus": "Uranus—seventh planet from the Sun—rotates at a nearly 90-degree angle from the plane of its orbit. This unique tilt makes Uranus appear to spin on its side.",
            "Neptune": "Neptune—the eighth and most distant major planet orbiting our Sun—is dark, cold and whipped by supersonic winds. It was the first planet located through mathematical calculations."
        };

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 5;
        controls.maxDistance = 2000;

        // --- LIGHTING ---
        const sunLight = new THREE.PointLight(0xffffff, 2, 2000);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x404040, 0.5));

        // --- GALAXY BACKGROUND (360 Experience) ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 15000;
        const posArray = new Float32Array(starCount * 3);
        for(let i=0; i < starCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 3000;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starMaterial = new THREE.PointsMaterial({ size: 0.7, color: 0xffffff });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // --- PLANET GENERATOR ---
        const planets = [];
        const createPlanet = (name, size, distance, color) => {
            const geo = new THREE.SphereGeometry(size, 32, 32);
            const mat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.2 });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Random orbit position
            const angle = Math.random() * Math.PI * 2;
            mesh.position.set(Math.cos(angle) * distance, 0, Math.sin(angle) * distance);
            mesh.userData = { name: name, info: solarData[name] };
            
            scene.add(mesh);
            planets.push(mesh);

            // Orbit Ring
            const ringGeo = new THREE.RingGeometry(distance, distance + 0.5, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x444444, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);
            
            return mesh;
        };

        // --- INITIALIZE SYSTEM ---
        const sun = createPlanet("Sun", 15, 0, 0xffcc00);
        createPlanet("Mercury", 2, 40, 0xaaaaaa);
        createPlanet("Venus", 4, 70, 0xe3bb76);
        createPlanet("Earth", 4.2, 100, 0x2233ff);
        createPlanet("Mars", 3, 130, 0xff4422);
        createPlanet("Jupiter", 10, 200, 0xffa500);
        createPlanet("Saturn", 8, 260, 0xdfd195);
        createPlanet("Uranus", 6, 320, 0x88ddff);
        createPlanet("Neptune", 6, 380, 0x3366ff);

        camera.position.set(150, 100, 300);

        // --- INTERACTION ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const onMouseClick = (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets);

            if (intersects.length > 0) {
                const p = intersects[0].object;
                showHolo(p.userData.name, p.userData.info);
            } else {
                closeHolo();
            }
        };

        window.showHolo = (name, info) => {
            document.getElementById('planet-name').innerText = name;
            document.getElementById('planet-info').innerHTML = `<p>${info}</p>`;
            document.getElementById('holoframe').classList.add('active');
        };

        window.closeHolo = () => {
            document.getElementById('holoframe').classList.remove('active');
        };

        window.addEventListener('click', onMouseClick);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Subtle rotation for planets
            planets.forEach((p, i) => {
                if(i !== 0) { // Don't rotate sun position
                    const time = Date.now() * 0.0001 * (10 / (i * 5));
                    const dist = 40 + (i-1) * 45;
                    // p.position.x = Math.cos(time) * dist;
                    // p.position.z = Math.sin(time) * dist;
                }
                p.rotation.y += 0.01;
            });

            stars.rotation.y += 0.0002;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
