<!DOCTYPE html>
<html>
<head>
    <title>Nexus Vortex | 4D Symbiote Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        #ui-layer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 50px;
            z-index: 100;
            pointer-events: none;
        }

        .nav-btn {
            pointer-events: auto;
            padding: 12px 30px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            font-weight: bold;
        }

        .nav-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #00ffff;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; cursor: pointer; text-align: center;
        }

        #promo-carousel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        .promo-slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .promo-slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        .promo-slide video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        #promo-nav {
            position: absolute;
            bottom: 200px;
            width: 100%;
            text-align: center;
            z-index: 1001;
        }

        #continue-nav {
            position: absolute;
            bottom: 120px;
            width: 100%;
            text-align: center;
            z-index: 1001;
        }

        #promo-nav .nav-btn,
        #continue-nav .nav-btn {
            font-size: 1.8vw;
            padding: 20px 60px;
        }

        #overlay-instruction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5vw;
            opacity: 0.8;
        }

        #initialize-content {
            display: none;
        }

        #youtube-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        #xr-button {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            font-size: 1.6em;
            padding: 20px 55px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="promo-carousel">
            <div class="promo-slide active">
                <video src="https://files.catbox.moe/7r5z5p.mp4" muted playsinline loop autoplay onclick="claimCredits()"></video>
            </div>
            <div class="promo-slide">
                <video src="https://files.catbox.moe/mzl0pk.mp4" muted playsinline loop autoplay onclick="claimCredits()"></video>
            </div>
            <div class="promo-slide">
                <video src="https://files.catbox.moe/ym9cua.mp4" muted playsinline loop autoplay onclick="claimCredits()"></video>
            </div>
        </div>

        <div id="promo-nav">
            <button class="nav-btn" onclick="claimCredits()">
                SUBSCRIBE & CLAIM 300 CREDITS NOW!
            </button>
        </div>

        <div id="continue-nav">
            <button class="nav-btn" onclick="switchToInitialize()">
                CONTINUE TO NEXUS VORTEX »
            </button>
        </div>

        <div id="initialize-content">
            <h1>INITIALIZE NEXUS STREAM</h1>
            <p>(Click to sync audio & visual symbiotes)</p>
        </div>

        <p id="overlay-instruction">(Click on video or subscribe button to claim credits, or continue to experience)</p>
    </div>

    <div id="ui-layer">
        <button class="nav-btn" onclick="resetToLanding()">« BACK TO ENTRY</button>
        <button class="nav-btn" onclick="claimCredits()">Claim 300 Credits »</button>
    </div>

    <div id="youtube-player"></div>

<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

    // YouTube IFrame API
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    let player;
    let isPlayerReady = false;

    window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('youtube-player', {
            height: '1',
            width: '1',
            playerVars: {
                'playsinline': 1,
                'controls': 0,
                'showinfo': 0,
                'rel': 0,
                'modestbranding': 1
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    };

    function onPlayerReady(event) {
        isPlayerReady = true;
        // We'll start playback later when user proceeds
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            // Optional: loop playlist or do nothing (shuffle already randomizes)
        }
    }

    // Navigation
    window.resetToLanding = () => {
        window.location.reload(); // Full reset to promo/landing state
    };

    window.claimCredits = () => {
        window.open('https://openartai.pxf.io/c/6240385/3321097/38572', '_blank');
    };

    // Promo videos: infinite sequential loop
    const promoSlides = document.querySelectorAll('.promo-slide');
    const videos = document.querySelectorAll('.promo-slide video');
    let currentPromo = 0;

    function cyclePromo() {
        promoSlides.forEach(slide => slide.classList.remove('active'));
        promoSlides[currentPromo].classList.add('active');
        currentPromo = (currentPromo + 1) % promoSlides.length;
    }

    videos.forEach(video => {
        video.addEventListener('ended', () => {
            // Pause current, cycle to next, play it
            video.pause();
            cyclePromo();
            const nextVideo = videos[currentPromo];
            nextVideo.currentTime = 0;
            nextVideo.play().catch(() => {}); // silent fail on mobile autoplay
        });
    });

    // Auto-start first video
    if (videos.length > 0) {
        videos[0].play().catch(() => {});
    }

    // State
    let state = 'promo';

    window.switchToInitialize = () => {
        if (state !== 'promo') return;
        state = 'initialize';

        document.getElementById('promo-carousel').style.display = 'none';
        document.getElementById('promo-nav').style.display = 'none';
        document.getElementById('continue-nav').style.display = 'none';
        document.getElementById('initialize-content').style.display = 'block';
        document.getElementById('overlay-instruction').textContent = '(Click anywhere to sync symbiotes)';

        // Start audio here (user gesture context)
        startAudioExperience();
    };

    // Overlay click → enter experience
    const overlay = document.getElementById('overlay');
    overlay.addEventListener('click', (e) => {
        if (state === 'initialize' && e.target.tagName !== 'BUTTON') {
            initVisualsAndAudio();
        }
    });

    // --- Audio + VR + Core Engine ---
    let analyser, dataArray, audioContext;
    let initialized = false;

    async function startAudioExperience() {
        if (isPlayerReady && player) {
            try {
                player.setVolume(100);
                player.setShuffle(true);
                player.cuePlaylist({
                    list: 'PLlnkmUosVw9jSfM6Qo3j_m-KBQz_-6fSF',
                    listType: 'playlist',
                    index: Math.floor(Math.random() * 50) // rough random start
                });
                player.playVideo();
            } catch (err) {
                console.warn('YouTube start failed:', err);
            }
        }
    }

    async function initVisualsAndAudio() {
        if (initialized) return;
        initialized = true;

        overlay.style.display = 'none';

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        } catch (err) {
            console.warn('Mic access denied — using fallback animation amplitude');
        }
    }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    renderer.xr.enabled = true;

    let xrButton = null;

    async function checkForXR() {
        if (!('xr' in navigator)) return;
        const supported = await navigator.xr.isSessionSupported('immersive-vr');
        if (supported) {
            xrButton = document.createElement('button');
            xrButton.id = 'xr-button';
            xrButton.className = 'nav-btn';
            xrButton.textContent = '🌌 ENTER VR IMMERSION';
            document.body.appendChild(xrButton);
            xrButton.onclick = enterVRSession;
        }
    }

    window.enterVRSession = async () => {
        if (state === 'promo') {
            switchToInitialize();
        }
        await initVisualsAndAudio(); // ensure audio + mic

        try {
            const session = await navigator.xr.requestSession('immersive-vr', {
                optionalFeatures: ['local-floor']
            });
            renderer.xr.setReferenceSpaceType('local-floor');
            session.addEventListener('end', onSessionEnded);
            await renderer.xr.setSession(session);

            nodeGroup.position.set(0, 1.6, -3.5);
            nodeGroup.scale.setScalar(2.8);
        } catch (error) {
            console.error('VR session failed:', error);
            if (xrButton) xrButton.textContent = 'VR UNAVAILABLE';
        }
    };

    function onSessionEnded() {
        if (xrButton) xrButton.textContent = '🌌 RE-ENTER VR IMMERSION';
        nodeGroup.position.set(0, 0, 0);
        nodeGroup.scale.setScalar(1);
        nodeGroup.quaternion.set(0, 0, 0, 1);
    }

    const rightController = renderer.xr.getController(1);
    scene.add(rightController);

    let gripped = false;
    const gripStartQuat = new THREE.Quaternion();
    const nodeGroupStartQuat = new THREE.Quaternion();
    const autoSpinQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), 0.002);

    rightController.addEventListener('squeezestart', () => {
        gripped = true;
        gripStartQuat.copy(rightController.quaternion);
        nodeGroupStartQuat.copy(nodeGroup.quaternion);
    });

    rightController.addEventListener('squeezeend', () => gripped = false);

    // 4D tesseract setup (unchanged)
    const vertices4D = [];
    for (let i = 0; i < 16; i++) {
        vertices4D.push([i&1?1:-1, i&2?1:-1, i&4?1:-1, i&8?1:-1]);
    }

    const nodes = [];
    const nodeGroup = new THREE.Group();
    const geometry = new THREE.SphereGeometry(0.06, 16, 16);

    vertices4D.forEach(() => {
        const material = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff });
        const node = new THREE.Mesh(geometry, material);
        nodes.push(node);
        nodeGroup.add(node);
    });
    scene.add(nodeGroup);
    scene.add(new THREE.PointLight(0xffffff, 1, 100));

    const lines = [];
    const lineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 });
    for (let i = 0; i < 16; i++) {
        for (let j = i + 1; j < 16; j++) {
            let diff = 0;
            for (let k = 0; k < 4; k++) if (vertices4D[i][k] !== vertices4D[j][k]) diff++;
            if (diff === 1) {
                const line = new THREE.Line(new THREE.BufferGeometry(), lineMat);
                lines.push({ line, i, j });
                scene.add(line);
            }
        }
    }

    camera.position.z = 4;
    let angle = 0;

    function animate() {
        renderer.setAnimationLoop(animate);

        let bassTrigger = 0.1; // fallback
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            bassTrigger = dataArray[2] / 255;
        }

        angle += 0.005 + (bassTrigger * 0.04);

        const cosA = Math.cos(angle);
        const sinA = Math.sin(angle);

        const projected3D = vertices4D.map(v => {
            let x = v[0], y = v[1], z = v[2], w = v[3];
            let x1 = x * cosA - w * sinA;
            let w1 = x * sinA + w * cosA;
            let y2 = y * cosA - w1 * sinA;
            let w2 = y * sinA + w1 * cosA;
            const factor = 1 / (3.0 + (bassTrigger * 2) - w2);
            return new THREE.Vector3(x1 * factor, y2 * factor, z * factor);
        });

        nodes.forEach((node, i) => {
            node.position.copy(projected3D[i]);
            const s = 1 + ((analyser ? dataArray[i % 16] : 80) / 255) * 4;
            node.scale.set(s, s, s);
        });

        lines.forEach(({ line, i, j }) => {
            line.geometry.setFromPoints([projected3D[i], projected3D[j]]);
        });

        if (!gripped) {
            nodeGroup.quaternion.multiply(autoSpinQuat);
        } else if (rightController) {
            const deltaQuat = gripStartQuat.clone().invert().multiply(rightController.quaternion);
            nodeGroup.quaternion.copy(nodeGroupStartQuat).multiply(deltaQuat);
        }

        renderer.render(scene, camera);
    }

    // Kick off
    checkForXR();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
