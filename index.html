<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Vortex | Adaptive Solar Explorer</title>
    <style>
        :root {
            --neon-blue: #00ffff;
            --glass-bg: rgba(0, 255, 255, 0.05);
        }

        body, html { 
            margin: 0; 
            padding: 0;
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        canvas { display: block; touch-action: none; }

        /* Adaptive Glass Holoframe */
        #holoframe {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 520px;
            max-height: 80vh;
            background: rgba(0, 10, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 20px;
            color: #fff;
            padding: 25px;
            display: none;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.25);
            z-index: 1000;
            opacity: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
            box-sizing: border-box;
        }

        #holoframe.active {
            display: flex;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #holoframe h2 { 
            color: var(--neon-blue); 
            margin: 0 0 18px 0; 
            font-size: 1.6rem;
            text-transform: uppercase; 
            letter-spacing: 3px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.25);
            padding-bottom: 12px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        #content-wrapper {
            overflow-y: auto;
            padding-right: 12px;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-blue) transparent;
        }

        #content-wrapper::-webkit-scrollbar { width: 5px; }
        #content-wrapper::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 5px; }

        #planet-info { 
            line-height: 1.7; 
            font-size: 1.05rem; 
            color: #e0f0ff; 
            margin: 0;
        }
        
        .close-btn {
            align-self: flex-end;
            background: transparent;
            border: 1.5px solid var(--neon-blue);
            color: var(--neon-blue);
            cursor: pointer;
            padding: 10px 24px;
            margin-top: 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.25s ease;
        }

        .close-btn:hover { 
            background: var(--neon-blue); 
            color: #000; 
            box-shadow: 0 0 20px rgba(0,255,255,0.6);
        }

        /* Bottom UI Label */
        .instruction-box {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(0, 255, 255, 0.45);
            pointer-events: none;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2.5px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Learn More Button */
        #learn-more {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 1100;
            background: rgba(0,255,255,0.08);
            border: 1px solid rgba(0,255,255,0.5);
            color: #00ffff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
            transition: all 0.3s ease;
        }

        #learn-more:hover {
            background: rgba(0,255,255,0.25);
            transform: scale(1.15);
            box-shadow: 0 0 25px rgba(0,255,255,0.6);
        }

        @media (max-width: 600px) {
            #holoframe { padding: 20px; }
            #holoframe h2 { font-size: 1.4rem; }
            .instruction-box { font-size: 9px; bottom: 12px; }
            #learn-more { width: 42px; height: 42px; font-size: 1.6rem; top: 18px; right: 18px; }
        }

        /* Navigation Layer */
        #ui-layer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 50px;
            z-index: 100;
            pointer-events: none;
        }

        .nav-btn {
            pointer-events: auto;
            padding: 12px 30px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            font-weight: bold;
        }

        .nav-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #00ffff;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; cursor: pointer; text-align: center;
        }

        #promo-carousel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        .promo-slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .promo-slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        .promo-slide video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        #promo-nav {
            position: absolute;
            bottom: 200px;
            width: 100%;
            text-align: center;
            z-index: 1001;
        }

        #continue-nav {
            position: absolute;
            bottom: 120px;
            width: 100%;
            text-align: center;
            z-index: 1001;
        }

        #promo-nav .nav-btn,
        #continue-nav .nav-btn {
            font-size: 1.8vw;
            padding: 20px 60px;
        }

        #overlay-instruction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5vw;
            opacity: 0.8;
        }

        #initialize-content {
            display: none;
        }

        #youtube-player {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="promo-carousel">
            <div class="promo-slide active">
                <video src="https://files.catbox.moe/7r5z5p.mp4" muted playsinline loop="false" onclick="claimCredits()"></video>
            </div>
            <div class="promo-slide">
                <video src="https://files.catbox.moe/mzl0pk.mp4" muted playsinline loop="false" onclick="claimCredits()"></video>
            </div>
            <div class="promo-slide">
                <video src="https://files.catbox.moe/ym9cua.mp4" muted playsinline loop="false" onclick="claimCredits()"></video>
            </div>
        </div>

        <div id="promo-nav">
            <button class="nav-btn" onclick="claimCredits()">
                SUBSCRIBE & CLAIM 300 CREDITS NOW!
            </button>
        </div>

        <div id="continue-nav">
            <button class="nav-btn" onclick="switchToInitialize()">
                CONTINUE TO NEXUS VORTEX »
            </button>
        </div>

        <div id="initialize-content">
            <h1>INITIALIZE NEXUS STREAM</h1>
            <p>(Click to sync audio & visual symbiotes)</p>
        </div>

        <p id="overlay-instruction">(Click on video or subscribe button to claim credits, or continue to experience)</p>
    </div>

    <div id="ui-layer">
        <button class="nav-btn" onclick="goBack()">« BACK TO ENTRY</button>
        <button class="nav-btn" onclick="claimCredits()">Claim 300 Credits »</button>
    </div>

    <div id="youtube-player"></div>

    <div id="holoframe">
        <h2 id="planet-name">Nexus Node</h2>
        <div id="content-wrapper">
            <div id="planet-info">Tap or click planets to explore cosmic data streams...</div>
        </div>
        <button class="close-btn" onclick="closeHolo()">DISMISS</button>
    </div>

    <div class="instruction-box">Touch/Click planets • Pinch/Drag/Scroll to navigate galaxy</div>

    <div id="learn-more" onclick="window.open('https://solarsystem.nasa.gov/', '_blank')">ℹ️</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // YouTube API
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    let player;
    let isPlayerReady = false;

    window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('youtube-player', {
            height: '1',
            width: '1',
            playerVars: { 'playsinline': 1, 'controls': 0, 'showinfo': 0, 'rel': 0, 'modestbranding': 1 },
            events: { 'onReady': onPlayerReady }
        });
    };

    function onPlayerReady() { isPlayerReady = true; }

    // Navigation
    window.goBack = () => window.location.reload();
    window.claimCredits = () => window.open('https://openartai.pxf.io/c/6240385/3321097/38572', '_blank');

    // Promo carousel (infinite loop)
    const promoSlides = document.querySelectorAll('.promo-slide');
    const videos = document.querySelectorAll('.promo-slide video');
    let currentPromo = 0;

    function cyclePromo() {
        promoSlides.forEach(slide => slide.classList.remove('active'));
        videos.forEach(v => v.pause());
        promoSlides[currentPromo].classList.add('active');
        videos[currentPromo].play();
        currentPromo = (currentPromo + 1) % promoSlides.length;
    }

    videos.forEach(video => video.addEventListener('ended', cyclePromo));
    if (videos.length) videos[0].play().catch(() => {});

    // State
    let state = 'promo';
    let initialized = false;

    window.switchToInitialize = () => {
        if (state !== 'promo') return;
        state = 'initialize';
        document.getElementById('promo-carousel').style.display = 'none';
        document.getElementById('promo-nav').style.display = 'none';
        document.getElementById('continue-nav').style.display = 'none';
        document.getElementById('initialize-content').style.display = 'block';
        document.getElementById('overlay-instruction').textContent = '(Click anywhere to sync symbiotes)';
        startAudioExperience();
    };

    const overlay = document.getElementById('overlay');
    overlay.addEventListener('click', (e) => {
        if (state === 'initialize' && e.target.tagName !== 'BUTTON') init();
    });

    // Audio
    let analyser, dataArray, audioContext;
    const instructionBox = document.querySelector('.instruction-box');

    async function startAudioExperience() {
        if (isPlayerReady && player) {
            player.setVolume(100);
            player.setShuffle(true);
            player.cuePlaylist({ list: 'PLlnkmUosVw9jSfM6Qo3j_m-KBQz_-6fSF', listType: 'playlist', index: Math.floor(Math.random() * 50) });
            player.playVideo();
        }
    }

    async function init() {
        if (initialized) return;
        initialized = true;
        overlay.style.display = 'none';
        document.getElementById('learn-more').style.display = 'flex';

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        } catch (err) {
            console.warn('Mic access denied — using fallback animation');
            instructionBox.textContent += ' (mic access denied)';
        }
    }

    // NASA facts
    const solarData = { /* unchanged from previous version */ 
        "Sun": "The Sun is a 4.6 billion-year-old yellow dwarf star – a hot glowing ball of hydrogen and helium – at the center of our solar system. It accounts for 99.8% of the system's mass and its energy drives life on Earth.",
        "Mercury": "Mercury is the smallest planet and closest to the Sun. It has extreme temperature swings, no substantial atmosphere, and is heavily cratered like Earth's Moon.",
        "Venus": "Venus is the second planet from the Sun and the hottest in our solar system due to its thick carbon dioxide atmosphere and runaway greenhouse effect. It rotates backwards and has crushing surface pressure.",
        "Earth": "Earth is the third planet from the Sun and the only known world to support life. It has liquid surface water, a protective atmosphere, and a magnetic field that shields it from solar radiation.",
        "Mars": "Mars is the fourth planet from the Sun – a cold, desert world with a thin atmosphere. It features the solar system's tallest volcano (Olympus Mons) and evidence of ancient rivers and possible past habitability.",
        "Jupiter": "Jupiter is the largest planet and fifth from the Sun. A gas giant with a Great Red Spot storm larger than Earth, it has a powerful magnetic field and at least 95 moons.",
        "Saturn": "Saturn is the sixth planet from the Sun and famous for its extensive, complex system of icy rings. It is the least dense planet and has more moons than any other (over 145 confirmed).",
        "Uranus": "Uranus is the seventh planet from the Sun – an ice giant that rotates on its side (axial tilt ~98°). It has a faint ring system and 28 known moons.",
        "Neptune": "Neptune is the eighth and farthest known planet – a deep blue ice giant with the strongest winds in the solar system (up to 1,500 mph). It was discovered mathematically before being observed."
    };

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.6;
    controls.zoomSpeed = 1.2;
    controls.minDistance = 40;
    controls.maxDistance = 1200;
    controls.enablePan = false;

    const sunLight = new THREE.PointLight(0xffffff, 3.5, 3000);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.18));

    // Starfield
    const starGeo = new THREE.BufferGeometry();
    const starVertices = [];
    for(let i = 0; i < 12000; i++) {
        starVertices.push(THREE.MathUtils.randFloatSpread(4000), THREE.MathUtils.randFloatSpread(4000), THREE.MathUtils.randFloatSpread(4000));
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
    const starMat = new THREE.PointsMaterial({ size: 1.8, color: 0x88ffff, transparent: true, opacity: 0.7, sizeAttenuation: true });
    const starField = new THREE.Points(starGeo, starMat);
    scene.add(starField);

    const planets = [];           // for raycasting
    const planetSystems = [];     // for orbits & moons

    const createBody = (name, radius, distance, color, emissive = 0) => {
        const geo = new THREE.SphereGeometry(radius, 48, 48);
        const mat = new THREE.MeshStandardMaterial({ 
            color, emissive: color, emissiveIntensity: emissive || (name === "Sun" ? 1.4 : 0.12),
            metalness: name === "Sun" ? 0.1 : 0.05, roughness: 0.7
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.userData = { name, info: solarData[name] || "Cosmic data initializing..." };
        scene.add(mesh);
        planets.push(mesh);

        const system = {
            mesh: mesh,
            orbitalDist: distance,
            orbitalSpeed: 0,
            angle: Math.random() * Math.PI * 2,
            moons: []
        };
        planetSystems.push(system);
        return mesh;
    };

    // Bodies
    createBody("Sun", 18, 0, 0xffdd00, 2.2);
    createBody("Mercury", 2.2, 60, 0xaaaaaa);
    createBody("Venus", 3.8, 90, 0xffcc66);
    createBody("Earth", 4.0, 130, 0x3388ff);
    createBody("Mars", 3.0, 180, 0xff5533);
    createBody("Jupiter", 10, 300, 0xffbb77);
    createBody("Saturn", 8.5, 450, 0xffeebb);
    createBody("Uranus", 6, 650, 0xaaffff);
    createBody("Neptune", 6, 800, 0x3366dd);

    // Saturn rings
    const saturnMesh = planets.find(p => p.userData.name === "Saturn");
    if (saturnMesh) {
        const ringGeo = new THREE.RingGeometry(12, 22, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffeecc, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
        const rings = new THREE.Mesh(ringGeo, ringMat);
        rings.rotation.x = Math.PI / 2.1;
        saturnMesh.add(rings);
    }

    // Set orbital speeds (accurate relative pacing – inner faster, outer slower)
    const speedMap = {
        "Mercury": 0.0098, "Venus": 0.0059, "Earth": 0.0043,
        "Mars": 0.0029, "Jupiter": 0.00115, "Saturn": 0.00068,
        "Uranus": 0.00034, "Neptune": 0.00019, "Sun": 0
    };
    planetSystems.forEach(s => {
        s.orbitalSpeed = speedMap[s.mesh.userData.name] || 0.001;
    });

    // Initial positions
    planetSystems.forEach(s => {
        s.mesh.position.x = Math.cos(s.angle) * s.orbitalDist;
        s.mesh.position.z = Math.sin(s.angle) * s.orbitalDist;
    });

    // === ACCURATE MOONS (real major moons, scaled for visibility) ===
    const addMoon = (parentSys, radius, dist, speed, color = 0xcccccc) => {
        const moonMesh = new THREE.Mesh(
            new THREE.SphereGeometry(radius, 24, 24),
            new THREE.MeshStandardMaterial({ color, emissive: 0x222222, emissiveIntensity: 0.15 })
        );
        scene.add(moonMesh);
        parentSys.moons.push({ mesh: moonMesh, dist, speed, angle: Math.random() * Math.PI * 2 });
    };

    // Earth
    let earthSys = planetSystems.find(s => s.mesh.userData.name === "Earth");
    if (earthSys) addMoon(earthSys, 1.15, 19, 0.078, 0xdddddd);

    // Mars
    let marsSys = planetSystems.find(s => s.mesh.userData.name === "Mars");
    if (marsSys) {
        addMoon(marsSys, 0.65, 7.8, 0.165, 0x777777);   // Phobos
        addMoon(marsSys, 0.45, 12.5, 0.062, 0x999999);  // Deimos
    }

    // Jupiter (Galilean moons)
    let jupSys = planetSystems.find(s => s.mesh.userData.name === "Jupiter");
    if (jupSys) {
        addMoon(jupSys, 0.95, 19, 0.112, 0xffaa33);     // Io
        addMoon(jupSys, 0.85, 24, 0.087, 0x99ccff);     // Europa
        addMoon(jupSys, 1.35, 32, 0.058, 0xeeddbb);     // Ganymede
        addMoon(jupSys, 1.2, 41, 0.033, 0x888888);      // Callisto
    }

    // Saturn
    let satSys = planetSystems.find(s => s.mesh.userData.name === "Saturn");
    if (satSys) {
        addMoon(satSys, 1.85, 26, 0.046, 0xffeecc);     // Titan
        addMoon(satSys, 0.75, 16.5, 0.125, 0xdddddd);   // Rhea
        addMoon(satSys, 0.55, 21, 0.092, 0xaaaaaa);     // Enceladus
    }

    // Uranus
    let uraSys = planetSystems.find(s => s.mesh.userData.name === "Uranus");
    if (uraSys) {
        addMoon(uraSys, 1.12, 17.5, 0.071, 0x99ffff);
        addMoon(uraSys, 1.05, 23, 0.053, 0x77ccff);
        addMoon(uraSys, 0.85, 14.5, 0.098, 0x99dddd);
    }

    // Neptune (Triton is retrograde)
    let nepSys = planetSystems.find(s => s.mesh.userData.name === "Neptune");
    if (nepSys) {
        addMoon(nepSys, 1.45, 22, -0.042, 0x6688ff);   // Triton (negative speed = retrograde)
        addMoon(nepSys, 0.65, 29, 0.029, 0x9999aa);
    }

    camera.position.set(0, 220, 600);
    controls.update();

    // Raycaster
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function onPointerDown(event) {
        event.preventDefault();
        const x = event.clientX !== undefined ? event.clientX : event.touches[0].clientX;
        const y = event.clientY !== undefined ? event.clientY : event.touches[0].clientY;
        pointer.x = (x / window.innerWidth) * 2 - 1;
        pointer.y = -(y / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const intersects = raycaster.intersectObjects(planets);
        if (intersects.length > 0) {
            const obj = intersects[0].object;
            document.getElementById('planet-name').textContent = obj.userData.name.toUpperCase();
            document.getElementById('planet-info').textContent = obj.userData.info;
            document.getElementById('holoframe').classList.add('active');
        }
    }

    window.addEventListener('click', onPointerDown);
    window.addEventListener('touchstart', onPointerDown);
    window.closeHolo = () => document.getElementById('holoframe').classList.remove('active');

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
        requestAnimationFrame(animate);

        starField.rotation.y += 0.00015;

        let bassTrigger = 0.1;
        let avgFreq = 0.15;
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < 32; i++) sum += dataArray[i];
            avgFreq = sum / (32 * 255);
            bassTrigger = dataArray[2] / 255;
        }

        // === SLOW PLANET ORBITS + MOONS ===
        planetSystems.forEach(sys => {
            if (sys.orbitalSpeed > 0) {
                sys.angle += sys.orbitalSpeed * (1 + bassTrigger * 1.5);   // audio makes orbits subtly faster
                sys.mesh.position.x = Math.cos(sys.angle) * sys.orbitalDist;
                sys.mesh.position.z = Math.sin(sys.angle) * sys.orbitalDist;
            }

            sys.moons.forEach(m => {
                m.angle += m.speed * (1 + bassTrigger);
                m.mesh.position.x = sys.mesh.position.x + Math.cos(m.angle) * m.dist;
                m.mesh.position.z = sys.mesh.position.z + Math.sin(m.angle) * m.dist;
                m.mesh.position.y = Math.sin(m.angle * 2.8) * (m.dist * 0.07);   // gentle inclination
                m.mesh.rotation.y += 0.018;
            });

            // Planet self-rotation + audio pulse
            const freqImpact = analyser ? (dataArray[planets.indexOf(sys.mesh) % dataArray.length] / 255) : 0.2;
            const s = 1 + freqImpact * 0.6;
            sys.mesh.scale.set(s, s, s);
            sys.mesh.material.emissiveIntensity = (sys.mesh.userData.name === "Sun" ? 1.4 : 0.12) + (avgFreq * 1.0);
            sys.mesh.rotation.y += (sys.mesh.userData.name === "Sun" ? 0.0018 : 0.0035) + bassTrigger * 0.015;
        });

        sunLight.intensity = 3.5 + bassTrigger * 2.8;

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    // Show learn-more after entering experience
    // (handled in init())
</script>
</body>
</html>
