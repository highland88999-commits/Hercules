<!DOCTYPE html>
<html>
<head>
    <title>Nexus Vortex | 4D Symbiote Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* Navigation Layer */
        #ui-layer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 50px;
            z-index: 100;
            pointer-events: none;
        }

        .nav-btn {
            pointer-events: auto;
            padding: 12px 30px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            font-weight: bold;
        }

        .nav-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #00ffff;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; cursor: pointer; text-align: center;
        }

        #promo-carousel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        .promo-slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .promo-slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        .promo-slide video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        #promo-nav {
            position: absolute;
            bottom: 200px;
            width: 100%;
            text-align: center;
            z-index: 1001;
        }

        #continue-nav {
            position: absolute;
            bottom: 120px;
            width: 100%;
            text-align: center;
            z-index: 1001;
        }

        #promo-nav .nav-btn,
        #continue-nav .nav-btn {
            font-size: 1.8vw;
            padding: 20px 60px;
        }

        #overlay-instruction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5vw;
            opacity: 0.8;
        }

        #initialize-content {
            display: none;
        }

        #youtube-player {
            display: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="promo-carousel">
            <div class="promo-slide active">
                <video src="https://files.catbox.moe/7r5z5p.mp4" muted playsinline loop="false" onclick="claimCredits()"></video>
            </div>
            <div class="promo-slide">
                <video src="https://files.catbox.moe/mzl0pk.mp4" muted playsinline loop="false" onclick="claimCredits()"></video>
            </div>
            <div class="promo-slide">
                <video src="https://files.catbox.moe/ym9cua.mp4" muted playsinline loop="false" onclick="claimCredits()"></video>
            </div>
        </div>

        <div id="promo-nav">
            <button class="nav-btn" onclick="claimCredits()">
                SUBSCRIBE & CLAIM 300 CREDITS NOW!
            </button>
        </div>

        <div id="continue-nav">
            <button class="nav-btn" onclick="switchToInitialize()">
                CONTINUE TO NEXUS VORTEX »
            </button>
        </div>

        <div id="initialize-content">
            <h1>INITIALIZE NEXUS STREAM</h1>
            <p>(Click to sync audio & visual symbiotes)</p>
        </div>

        <p id="overlay-instruction">(Click on video or subscribe button to claim credits, or continue to experience)</p>
    </div>

    <div id="ui-layer">
        <button class="nav-btn" onclick="goBack()">« Back to Entry</button>
        <button class="nav-btn" onclick="claimCredits()">Claim 300 Credits »</button>
    </div>

    <div id="youtube-player"></div>

<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

    // Load YouTube IFrame API
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    let player;
    let isPlayerReady = false;

    window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('youtube-player', {
            height: '0',
            width: '0',
            events: {
                'onReady': onPlayerReady
            }
        });
    };

    function onPlayerReady(event) {
        isPlayerReady = true;
    }

    // --- NAVIGATION LOGIC ---
    window.goBack = () => {
        window.history.back(); 
    };

    window.claimCredits = () => {
        window.open('https://openartai.pxf.io/c/6240385/3321097/38572', '_blank');
    };

    // Promo carousel cycling
    const promoSlides = document.querySelectorAll('.promo-slide');
    const videos = document.querySelectorAll('.promo-slide video');
    let currentPromo = 0;

    function cyclePromo() {
        promoSlides.forEach(slide => slide.classList.remove('active'));
        videos.forEach(v => v.pause());

        promoSlides[currentPromo].classList.add('active');
        videos[currentPromo].play();

        currentPromo = (currentPromo + 1) % promoSlides.length;
    }

    videos.forEach(video => {
        video.addEventListener('ended', cyclePromo);
    });

    // Start the first video
    if (videos.length > 0) {
        videos[0].play();
    }

    // State management
    let state = 'promo'; // 'promo' or 'initialize'

    window.switchToInitialize = () => {
        state = 'initialize';
        document.getElementById('promo-carousel').style.display = 'none';
        document.getElementById('promo-nav').style.display = 'none';
        document.getElementById('continue-nav').style.display = 'none';
        document.getElementById('initialize-content').style.display = 'block';
        document.getElementById('overlay-instruction').textContent = '(Click to sync audio & visual symbiotes)';
    };

    // Overlay click handler
    const overlay = document.getElementById('overlay');
    overlay.addEventListener('click', (e) => {
        if (state === 'initialize' && e.target.tagName !== 'BUTTON') {
            init();
        }
    });

    // --- CORE ENGINE ---
    let analyser, dataArray, audioContext;

    async function init() {
        // Start YouTube playlist (shuffled/random start)
        if (isPlayerReady) {
            player.cuePlaylist({
                list: 'PLlnkmUosVw9jSfM6Qo3j_m-KBQz_-6fSF',
                listType: 'playlist',
                suggestedQuality: 'small'
            });
            player.setShuffle(true);
            player.setVolume(100);
            player.playVideo();
        } else {
            console.warn('YouTube player not ready yet. Music may not start immediately.');
        }

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        overlay.style.display = 'none';
        animate();
    }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const vertices4D = [];
    for (let i = 0; i < 16; i++) {
        vertices4D.push([i&1?1:-1, i&2?1:-1, i&4?1:-1, i&8?1:-1]);
    }

    const nodes = [];
    const nodeGroup = new THREE.Group();
    const geometry = new THREE.SphereGeometry(0.06, 16, 16);

    vertices4D.forEach(() => {
        const material = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff });
        const node = new THREE.Mesh(geometry, material);
        nodes.push(node);
        nodeGroup.add(node);
    });
    scene.add(nodeGroup);
    scene.add(new THREE.PointLight(0xffffff, 1, 100));

    const lines = [];
    const lineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 });
    for (let i = 0; i < 16; i++) {
        for (let j = i + 1; j < 16; j++) {
            let diff = 0;
            for (let k = 0; k < 4; k++) if (vertices4D[i][k] !== vertices4D[j][k]) diff++;
            if (diff === 1) {
                const line = new THREE.Line(new THREE.BufferGeometry(), lineMat);
                lines.push({ line, i, j });
                scene.add(line);
            }
        }
    }

    camera.position.z = 4;
    let angle = 0;

    function animate() {
        requestAnimationFrame(animate);
        if(!analyser) return;
        analyser.getByteFrequencyData(dataArray);

        const bassTrigger = dataArray[2] / 255;
        angle += 0.005 + (bassTrigger * 0.04);

        const cosA = Math.cos(angle);
        const sinA = Math.sin(angle);

        const projected3D = vertices4D.map(v => {
            let x = v[0], y = v[1], z = v[2], w = v[3];
            let x1 = x * cosA - w * sinA;
            let w1 = x * sinA + w * cosA;
            let y2 = y * cosA - w1 * sinA;
            let w2 = y * sinA + w1 * cosA;
            const factor = 1 / (3.0 + (bassTrigger * 2) - w2);
            return new THREE.Vector3(x1 * factor, y2 * factor, z * factor);
        });

        nodes.forEach((node, i) => {
            node.position.copy(projected3D[i]);
            const s = 1 + (dataArray[i % 16] / 255) * 4;
            node.scale.set(s, s, s);
        });

        lines.forEach(({ line, i, j }) => {
            line.geometry.setFromPoints([projected3D[i], projected3D[j]]);
        });

        nodeGroup.rotation.y += 0.002;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
