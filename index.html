<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Vortex | Adaptive Solar Explorer</title>
    <style>
        :root {
            --neon-blue: #00ffff;
            --glass-bg: rgba(0, 255, 255, 0.05);
        }

        body, html { 
            margin: 0; 
            padding: 0;
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        canvas { display: block; touch-action: none; }

        /* Adaptive Glass Holoframe */
        #holoframe {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%; /* Adaptive width */
            max-width: 500px;
            max-height: 80vh; /* Prevents overflow on short screens */
            background: rgba(0, 10, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            color: #fff;
            padding: 25px;
            display: none;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
            z-index: 1000;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            box-sizing: border-box;
        }

        #holoframe.active {
            display: flex;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #holoframe h2 { 
            color: var(--neon-blue); 
            margin: 0 0 15px 0; 
            font-size: 1.5rem;
            text-transform: uppercase; 
            letter-spacing: 3px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        #content-wrapper {
            overflow-y: auto;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-blue) transparent;
        }

        #content-wrapper::-webkit-scrollbar { width: 4px; }
        #content-wrapper::-webkit-scrollbar-thumb { background: var(--neon-blue); }

        #planet-info { line-height: 1.7; font-size: 1rem; color: #e0e0e0; }
        
        .close-btn {
            align-self: flex-end;
            background: none;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            cursor: pointer;
            padding: 8px 15px;
            margin-top: 20px;
            border-radius: 5px;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .close-btn:hover { background: var(--neon-blue); color: #000; }

        /* Bottom UI Label */
        .instruction-box {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(0, 255, 255, 0.4);
            pointer-events: none;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        @media (max-width: 600px) {
            #holoframe { padding: 20px; }
            #holoframe h2 { font-size: 1.2rem; }
            .instruction-box { font-size: 8px; bottom: 10px; }
        }
    </style>
</head>
<body>

    <div id="holoframe">
        <h2 id="planet-name">Nexus Node</h2>
        <div id="content-wrapper">
            <div id="planet-info">Initializing data...</div>
        </div>
        <button class="close-btn" onclick="closeHolo()">DISMISS</button>
    </div>

    <div class="instruction-box">Touch/Click to explore planets • Pinch/Scroll to scale galaxy</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // NASA-Sourced facts
        const solarData = {
            "Sun": "The Sun is a 4.5 billion-year-old star – a hot glowing ball of hydrogen and helium at the center of our solar system. It makes up more than 99% of the solar system's matter.",
            "Mercury": "The smallest planet and closest to the Sun. It is only slightly larger than Earth's Moon and has no moons of its own.",
            "Venus": "The hottest planet in our solar system, with a surface temperature hot enough to melt lead. It spins in the opposite direction from most planets.",
            "Earth": "The only world known to support life so far. It is the only place in our solar system with liquid water on the surface.",
            "Mars": "A dusty, cold, desert world with a thin atmosphere. Evidence suggests it was much wetter and warmer billions of years ago.",
            "Jupiter": "The largest planet – twice as massive as all other planets combined. Its Great Red Spot is a storm larger than Earth.",
            "Saturn": "Famous for its dazzling and complex system of icy rings. It has the highest count of moons in our solar system.",
            "Uranus": "The seventh planet, rotating at a nearly 90-degree angle, making it appear to spin on its side.",
            "Neptune": "The most distant major planet, whipped by supersonic winds and located through mathematical calculations before it was seen."
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Performance optimization
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxDistance = 1500;
        controls.minDistance = 10;

        // Space Lighting
        const sunLight = new THREE.PointLight(0xffffff, 3, 2000);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        // Adaptive Galaxy Background
        const starGeo = new THREE.BufferGeometry();
        const stars = [];
        for(let i=0; i<10000; i++) {
            stars.push((Math.random()-0.5)*3000, (Math.random()-0.5)*3000, (Math.random()-0.5)*3000);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(stars, 3));
        const starMat = new THREE.PointsMaterial({ size: 1.5, color: 0x00ffff, transparent: true, opacity: 0.6 });
        const starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);

        const planets = [];
        const createBody = (name, size, dist, col) => {
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(size, 32, 32),
                new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: name === "Sun" ? 1 : 0.1 })
            );
            const pos = Math.random() * Math.PI * 2;
            mesh.position.set(Math.cos(pos)*dist, 0, Math.sin(pos)*dist);
            mesh.userData = { name, info: solarData[name] };
            scene.add(mesh);
            planets.push(mesh);

            if(dist > 0) {
                const ring = new THREE.Mesh(
                    new THREE.RingGeometry(dist, dist+0.3, 128),
                    new THREE.MeshBasicMaterial({ color: 0x00ffff, opacity: 0.1, transparent: true, side: THREE.DoubleSide })
                );
                ring.rotation.x = Math.PI/2;
                scene.add(ring);
            }
        };

        // Scaled for screen readability
        createBody("Sun", 12, 0, 0xffaa00);
        createBody("Mercury", 1.8, 35, 0x888888);
        createBody("Venus", 3.2, 55, 0xffcc33);
        createBody("Earth", 3.5, 80, 0x00aaff);
        createBody("Mars", 2.5, 105, 0xff4400);
        createBody("Jupiter", 8.5, 150, 0xffbb99);
        createBody("Saturn", 7, 200, 0xdfd195);
        createBody("Uranus", 5, 250, 0xccffff);
        createBody("Neptune", 5, 300, 0x3366ff);

        camera.position.set(0, 150, 300);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function handleSelect(x, y) {
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets);
            if (intersects.length > 0) {
                const p = intersects[0].object.userData;
                document.getElementById('planet-name').innerText = p.name;
                document.getElementById('planet-info').innerHTML = p.info;
                document.getElementById('holoframe').classList.add('active');
            }
        }

        window.addEventListener('click', (e) => handleSelect(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => handleSelect(e.touches[0].clientX, e.touches[0].clientY));
        
        window.closeHolo = () => document.getElementById('holoframe').classList.remove('active');

        // Adaptive Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            starField.rotation.y += 0.0003;
            planets.forEach(p => p.rotation.y += 0.01);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
